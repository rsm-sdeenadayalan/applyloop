<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>applyloop</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #fcfcfc;
      --text: #18181b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --border: #e9e9ec;
      --hover: #f4f4f5;
      --score-high: #0d7a4f;
      --score-mid: #9a6700;
      --score-low: #a1a1aa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101012;
        --text: #f4f4f5;
        --text-secondary: #a1a1aa;
        --text-muted: #63636b;
        --border: #232326;
        --hover: #18181a;
        --score-high: #34c98a;
        --score-mid: #d9a53f;
        --score-low: #63636b;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 0 24px 96px; }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 28px 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .wordmark {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }
    .meta {
      font-size: 13px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="wordmark" href="/">applyloop</a>
      {% block meta %}{% endblock %}
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
